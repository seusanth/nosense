<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NO SENSE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Rubik+Glitch&family=Rubik+Dirt&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #050505; color: #fff; cursor: crosshair; }

    #root {
      width: 100vw; height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative; overflow: hidden; background: #000;
      transition: filter 50ms ease-out;
    }

    .chromatic-aberration {
      text-shadow: 3px 0 0 rgba(255,0,0,0.7), -3px 0 0 rgba(0,0,255,0.7);
    }

    #scanlines {
      position: fixed; inset: 0;
      background: repeating-linear-gradient(to bottom, transparent, transparent 1px, rgba(255,255,255,0.03) 2px, rgba(255,255,255,0.01) 4px);
      pointer-events: none; z-index: 100;
    }

    #symbol-flash {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 16; pointer-events: none; opacity: 0;
      mix-blend-mode: difference;
    }
    #symbol-flash svg { width: 75vmin; height: 75vmin; filter: drop-shadow(0 0 10px #fff); }

    .ghost-ns {
      position: fixed;
      font-family: 'Rubik Glitch', sans-serif;
      font-weight: 900;
      text-transform: uppercase;
      color: #ff0000;
      pointer-events: none;
      z-index: 15;
      opacity: 0;
      white-space: nowrap;
      user-select: none;
      filter: blur(1px);
    }

    .trail-particle {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      font-family: 'Rubik Glitch', sans-serif;
      font-size: 24px;
      color: rgba(255,255,255,0.7);
      transform: translate(-50%, -50%);
    }

    .tear {
      position: fixed; left: 0; right: 0; height: 8px;
      background: rgba(255,255,255,0.4); opacity: 0; pointer-events: none; z-index: 17;
      box-shadow: 0 0 20px rgb(255, 0, 0), 0 0 40px rgb(0, 0, 255);
    }

    #bg-nosense {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Rubik Dirt', sans-serif;
      font-size: clamp(100px, 25vw, 350px);
      font-weight: 900; text-transform: uppercase;
      color: rgba(255, 0, 0, 0.04); letter-spacing: -10px;
      z-index: 1; pointer-events: none; white-space: nowrap;
      user-select: none; animation: flickerBg 0.5s infinite;
    }

    @keyframes flickerBg {
      0%  { opacity: 0.05; transform: translate(-50%, -50%) skewX(-5deg); }
      25% { opacity: 0; }
      50% { opacity: 0.08; transform: translate(-48%, -52%) scale(1.05); }
      75% { opacity: 0.02; }
      100% { opacity: 0.05; transform: translate(-50%, -50%) skewX(5deg); }
    }

    #nosense-main {
      font-family: 'Rubik Glitch', sans-serif;
      font-size: clamp(70px, 16vw, 200px);
      font-weight: 900; text-transform: uppercase;
      color: #fff; text-align: center; line-height: 1;
      position: relative; z-index: 2; user-select: none;
      animation: flickerMain 0.4s infinite;
    }

    @keyframes flickerMain {
      0%  { opacity: 1; transform: none; clip-path: inset(0 0 0 0); }
      10% { opacity: 0.8; clip-path: inset(20% 0 40% 0); transform: translateX(-15px) scaleY(1.2); }
      20% { opacity: 1; clip-path: inset(0 0 0 0); transform: none; text-shadow: 5px 0 red, -5px 0 blue; }
      30% { opacity: 0; }
      40% { opacity: 1; transform: translateX(15px) skewX(10deg); }
      70% { opacity: 1; clip-path: inset(60% 0 5% 0); transform: translateY(-10px); }
      100% { opacity: 1; transform: none; }
    }

    #question-box {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center; width: 92%; max-width: 900px;
      z-index: 3; display: none;
      flex-direction: column; align-items: center; gap: 32px;
    }
    #question-box.visible { display: flex; }

    #nosense-top {
      font-family: 'Rubik Glitch', sans-serif;
      font-size: clamp(32px, 7vw, 80px);
      font-weight: 900; text-transform: uppercase;
      color: #fff; text-align: center; letter-spacing: 2px;
      animation: flickerMain 0.6s infinite;
      position: relative; z-index: 4; display: none; user-select: none;
    }
    #nosense-top.visible { display: block; }

    #question-text {
      font-family: 'Special Elite', serif;
      font-size: clamp(22px, 4.5vw, 52px);
      font-weight: 400; color: #fff; text-align: center;
      line-height: 1.4; letter-spacing: 1.5px; opacity: 0;
      transition: opacity 0.2s ease; text-transform: uppercase;
      word-spacing: 8px; max-width: 800px;
      text-shadow: 0 0 5px rgba(255,255,255,0.6);
    }
    #question-text.show { opacity: 1; }

    #glitch-bar {
      width: 150px; height: 4px; background: #ff0000;
      animation: glitchBar 0.5s infinite;
    }
    @keyframes glitchBar {
      0%  { transform: scaleX(1) translateX(0); background: #ff0000; }
      30% { transform: scaleX(0.2) translateX(-100px); background: #00ff00; }
      60% { transform: scaleX(3) translateX(50px); background: #0000ff; }
      100% { transform: scaleX(1) translateX(0); background: #fff; }
    }

    #cta-btn {
      padding: 20px 60px;
      font-family: 'Rubik Glitch', sans-serif;
      font-size: clamp(16px, 2.5vw, 24px);
      font-weight: 900; text-transform: uppercase; letter-spacing: 8px;
      background: #fff; color: #000; border: 4px solid #fff;
      cursor: pointer; display: none; opacity: 0;
      transition: all 0.3s ease;
      position: relative;
      box-shadow: 0 0 30px rgba(255,255,255,0.5);
    }
    #cta-btn.show { display: inline-block; opacity: 1; }

    #cta-btn.melting {
      animation: meltText 1.5s forwards;
    }

    @keyframes meltText {
      0%   { filter: none; transform: none; background: #fff; }
      30%  { filter: blur(2px); transform: scaleY(1.3) skewX(10deg); background: #ff0000; color: #fff;}
      60%  { filter: blur(5px); transform: scaleY(1.8) translateY(15px) skewX(-15deg); background: #000; border-color: red; }
      100% { filter: blur(12px); transform: scaleY(3) translateY(40px); opacity: 0; }
    }

    #drips {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 100; display: none;
    }
    #drips.active { display: block; }
  </style>
</head>
<body>
<div id="root">
  <div id="scanlines"></div>
  <div id="symbol-flash"></div>
  <div class="tear" id="tear1"></div>
  <div class="tear" id="tear2"></div>
  <div id="bg-nosense">NO SENSE</div>
  <div id="nosense-main" class="chromatic-aberration">NO SENSE</div>

  <div id="question-box">
    <div id="nosense-top" class="chromatic-aberration">NO SENSE</div>
    <div id="question-text"></div>
    <div id="glitch-bar"></div>
    <div style="position:relative; display:inline-block;">
      <button id="cta-btn">FAZ SENTIDO?</button>
      <svg id="drips" viewBox="0 0 300 120" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none"></svg>
    </div>
  </div>
</div>

<script>
const symbols = [
  `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"><polygon points="100,10 190,170 10,170" stroke-width="6"/><ellipse cx="100" cy="130" rx="50" ry="30" stroke-width="5"/><circle cx="100" cy="130" r="18" stroke-width="4"/><circle cx="100" cy="130" r="7" fill="#fff"/><line x1="100" y1="100" x2="100" y2="60" stroke-width="3"/><line x1="50" y1="130" x2="20" y2="130" stroke-width="3"/><line x1="150" y1="130" x2="180" y2="130" stroke-width="3"/></svg>`,
  `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"><path d="M100,100 m0,-60 a60,60 0 1,1 -0.1,0 Z" stroke-width="4"/><path d="M100,100 m0,-45 a45,45 0 1,1 -0.1,0 Z" stroke-width="4"/><path d="M40,130 Q100,175 160,130" stroke-width="5"/><line x1="100" y1="152" x2="100" y2="172" stroke-width="4"/></svg>`,
  `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"><circle cx="100" cy="100" r="80" stroke-width="5"/><circle cx="100" cy="100" r="50" stroke-width="3"/><line x1="100" y1="20" x2="100" y2="180" stroke-width="4"/><line x1="20" y1="100" x2="180" y2="100" stroke-width="4"/></svg>`,
  `<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"><ellipse cx="100" cy="110" rx="70" ry="90" stroke-width="6"/><rect x="65" y="75" width="28" height="18" rx="3" stroke-width="4"/><rect x="107" y="75" width="28" height="18" rx="3" stroke-width="4"/><path d="M72,130 Q100,118 128,130" stroke-width="4"/></svg>`
];

const rootElement  = document.getElementById('root');
const mainTitle    = document.getElementById('nosense-main');
const nosenseTop   = document.getElementById('nosense-top');
const questionBox  = document.getElementById('question-box');
const questionText = document.getElementById('question-text');
const symbolFlash  = document.getElementById('symbol-flash');
const ctaBtn       = document.getElementById('cta-btn');
const drips        = document.getElementById('drips');
const tear1        = document.getElementById('tear1');
const tear2        = document.getElementById('tear2');

let qIndex = 0;
let lastSym = -1;
let ghosts = [];
let audioCtx = null;
let ambientOsc = null;

// ── SISTEMA DE ÁUDIO REFEITO E SEGURO PARA CELULARES ──
function initAudio() {
  if (audioCtx) return; 
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    ambientOsc = audioCtx.createOscillator();
    let ambientGain = audioCtx.createGain();
    ambientOsc.type = 'sawtooth';
    ambientOsc.frequency.setValueAtTime(45, audioCtx.currentTime); 
    
    let filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(120, audioCtx.currentTime);

    ambientGain.gain.setValueAtTime(0.15, audioCtx.currentTime);

    ambientOsc.connect(filter);
    filter.connect(ambientGain);
    ambientGain.connect(audioCtx.destination);
    ambientOsc.start();

    setInterval(() => {
      if(Math.random() > 0.6) playGlitchSound('glitch');
    }, 400);
  } catch (e) {
    console.log("Audio desativado ou não suportado:", e);
  }
}

function playGlitchSound(type) {
  if (!audioCtx || audioCtx.state === 'suspended') return;
  try {
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'glitch') {
      osc.type = Math.random() > 0.5 ? 'square' : 'sawtooth';
      osc.frequency.setValueAtTime(30 + Math.random() * 100, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.07, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.08);
    } else if (type === 'screech') {
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(900 + Math.random() * 600, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.25);
      gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.25);
    }
  } catch(e){}
}

const unlockAudio = () => {
  initAudio();
  if (audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
  window.removeEventListener('click', unlockAudio);
  window.removeEventListener('touchstart', unlockAudio);
};
window.addEventListener('click', unlockAudio);
window.addEventListener('touchstart', unlockAudio);

// ── EVENTOS DE MOUSE ──
window.addEventListener('mousemove', (e) => {
  if(Math.random() > 0.85) {
    const p = document.createElement('div');
    p.className = 'trail-particle';
    p.style.left = e.clientX + 'px';
    p.style.top = e.clientY + 'px';
    p.textContent = Math.random() > 0.5 ? 'Ø' : 'N0';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 150);
  }
});

function spawnGhosts() {
  for (let i = 0; i < 8; i++) {
    const el = document.createElement('div');
    el.className = 'ghost-ns';
    el.textContent = Math.random() > 0.5 ? 'VOCÊ ESTÁ VENDO?' : 'NO SENSE';
    rootElement.appendChild(el);
    ghosts.push(el);
  }
}
spawnGhosts();

function showGhosts() {
  ghosts.forEach(g => {
    const scale  = 0.5 + Math.random() * 2;
    const x      = Math.random() * 100;
    const y      = Math.random() * 100;
    const op     = 0.1 + Math.random() * 0.25;
    g.style.cssText = `
      left: ${x}vw; top: ${y}vh;
      font-size: ${scale * 40}px;
      opacity: ${op};
      transform: translate(-50%,-50%) skewX(${(Math.random()-0.5)*60}deg);
    `;
  });
  setTimeout(() => {
    ghosts.forEach(g => { g.style.opacity = '0'; });
  }, 100);
}

function randomSymbol() {
  let idx;
  do { idx = Math.floor(Math.random() * symbols.length); } while (idx === lastSym);
  lastSym = idx;
  return symbols[idx];
}

function glitchFlash(showSym = true) {
  playGlitchSound('glitch');
  if (showSym && Math.random() > 0.2) {
    symbolFlash.innerHTML = randomSymbol();
    symbolFlash.style.opacity = '1';
  }
  showGhosts();
  
  rootElement.style.filter = 'invert(1) hue-rotate(180deg) scale(1.02)';
  
  setTimeout(() => {
    rootElement.style.filter = 'none';
    symbolFlash.style.opacity   = '0';
  }, 70);
}

function tearGlitch() {
  const t = Math.random() > 0.5 ? tear1 : tear2;
  t.style.opacity = '1';
  t.style.top = (Math.random() * 90) + '%';
  t.style.transform = `scaleY(${Math.random() * 4})`;
  setTimeout(() => { t.style.opacity = '0'; }, 60);
  if(Math.random() > 0.7) playGlitchSound('glitch');
}

setInterval(() => { if (Math.random() > 0.4) glitchFlash(true);  }, 1200);
setInterval(() => { if (Math.random() > 0.3) tearGlitch(); }, 700);

setTimeout(() => {
  glitchFlash(true);
  playGlitchSound('screech');
  setTimeout(() => {
    mainTitle.style.display = 'none';
    nosenseTop.classList.add('visible');
    questionBox.classList.add('visible');
    showQuestion();
  }, 100);
}, 2500);

const questions = [
  "Você vê as nuvens lá fora?",
  "Por que eles estão sem mochila?",
  "O que o sofá sente quando você senta nele?",
  "Isso faz sentido pra você?",
  "Você percebeu eles te vigiando?",
  "Faz sentido?"
];

function showQuestion() {
  if (qIndex >= questions.length) {
    questionText.classList.remove('show');
    setTimeout(() => {
      questionText.textContent = '';
      ctaBtn.classList.add('show');
    }, 500);
    return;
  }

  questionText.classList.remove('show');
  setTimeout(() => { 
    glitchFlash(true); 
    questionText.textContent = questions[qIndex];
    questionText.classList.add('show');
    qIndex++;
    setTimeout(showQuestion, 2300 + Math.random() * 800);
  }, 400);
}

function buildDrips() {
  drips.classList.add('active');
  drips.innerHTML = '';
  const btnW = ctaBtn.offsetWidth;
  const btnH = ctaBtn.offsetHeight;
  drips.setAttribute('viewBox', `0 0 ${btnW} ${btnH + 120}`);
  drips.style.width  = btnW + 'px';
  drips.style.height = (btnH + 120) + 'px';

  const count = 15;
  for (let i = 0; i < count; i++) {
    const x   = Math.random() * btnW;
    const len = 40 + Math.random() * 80;
    const r   = 4  + Math.random() * 6;
    const dur = 0.4 + Math.random() * 0.6;

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.style.animation = `dripFall ${dur}s ease-in forwards`;

    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', x - r/2); rect.setAttribute('y', btnH - 5);
    rect.setAttribute('width', r); rect.setAttribute('height', len);
    rect.setAttribute('fill', '#ff0000'); rect.setAttribute('rx', r/2);

    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', x); circle.setAttribute('cy', btnH + len);
    circle.setAttribute('r', r * 1.2); circle.setAttribute('fill', '#ff0000');

    g.appendChild(rect); g.appendChild(circle); drips.appendChild(g);
  }
}

const styleEl = document.createElement('style');
styleEl.textContent = `
  @keyframes dripFall {
    0%   { transform: translateY(-50%); opacity: 1; }
    100% { transform: translateY(50%); opacity: 0; }
  }
`;
document.head.appendChild(styleEl);

// ── REDIRECIONAMENTO COM TIMEOUT DE SUSTO ──
const handleMeltAndRedirect = () => {
  if (ctaBtn.classList.contains('melting')) return;
  ctaBtn.classList.add('melting');
  playGlitchSound('screech');
  buildDrips();
  
  rootElement.style.transform = "scale(0.7) rotate(-8deg)";
  rootElement.style.filter = "invert(1) sepia(1) hue-rotate(0deg)";
  
  setTimeout(() => {
    window.location.href = "https://somvibe.lnk.to/ab37140";
  }, 600);
};

// Vincula tanto o clique quanto o touch para o redirecionamento
ctaBtn.addEventListener('click', handleMeltAndRedirect);
ctaBtn.addEventListener('touchstart', handleMeltAndRedirect);
</script>
</body>
</html>
